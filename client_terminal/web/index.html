<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Bull4x Chart</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0e0f13; overflow: hidden; }
  #tv_chart { position: absolute; inset: 0; }
  #loading {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #6b7280; font: 14px -apple-system, "Segoe UI", sans-serif; background: #0e0f13;
  }
</style>
</head>
<body>
  <div id="tv_chart"></div>
  <div id="loading">Loading chart…</div>

  <!-- Qt WebChannel bridge (copied next to this file at build time) -->
  <script src="qwebchannel.js"></script>
  <!-- TradingView Advanced Charts -->
  <script src="vendor/charting_library/charting_library.standalone.js"></script>
  <!-- Bull4x datafeed + broker adapter + app -->
  <script src="sc_datafeed.js"></script>
  <script src="sc_positions.js"></script>
  <script src="sc_broker.js"></script>
  <script src="app.js"></script>
</body>
</html>
